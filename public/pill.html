<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceFlow Island</title>
  <style>
    html, body {
      background: transparent !important;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
    }
    
    .dynamic-island-pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(18, 18, 24, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: none;
      border-radius: 20px;
      padding: 6px 12px;
      height: 38px;
      box-sizing: border-box;
      gap: 12px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      min-width: 110px;
    }
    
    /* 录音及失败状态较宽，成功状态则自适应宽度以显示文字 */
    .dynamic-island-pill.recording,
    .dynamic-island-pill.error {
      min-width: 170px;
      justify-content: space-between;
      gap: 12px;
    }
    
    .dynamic-island-pill.success {
      min-width: 110px;
      max-width: 275px; /* Keep total width under 275px inside 320px window bounds */
      width: fit-content;
      justify-content: space-between;
      gap: 8px;
    }
    
    .dynamic-island-pill.transcribing,
    .dynamic-island-pill.rewriting {
      min-width: 115px;
      justify-content: center;
      gap: 0;
      padding: 6px 18px;
    }
    
    /* 成功状态下的 ✔ 按钮 (高亮绿) */
    .pill-btn.confirm.success-state {
      background: rgba(16, 185, 129, 0.22) !important;
      color: #34d399 !important;
      transform: scale(1.05);
      display: flex !important;
    }
    /* 失败状态下的 × 按钮 (高亮红) */
    .pill-btn.cancel.error-state {
      background: rgba(239, 68, 68, 0.22) !important;
      color: #f87171 !important;
      transform: scale(1.05);
      display: flex !important;
    }
    
    /* 药丸小按钮 */
    .pill-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.06);
      color: #9ca3af;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }
    .pill-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      transform: scale(1.08);
    }
    .pill-btn.cancel:hover { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    .pill-btn.confirm:hover { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    
    /* 声波 */
    .pill-audio-wave {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px; /* Narrower gap for fine visual density */
      height: 18px;
    }
    .wave-bar {
      width: 2px; /* Slimmer bars */
      background: #ffffff;
      border-radius: 1px;
      display: inline-block;
      transform-origin: center;
      transition: transform 0.06s ease;
    }
    .bar-1 { height: 3px; }
    .bar-2 { height: 8px; }
    .bar-3 { height: 5px; }
    .bar-4 { height: 10px; }
    .bar-5 { height: 4px; }
    
    .pill-text {
      font-size: 0.82rem;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .text-green { color: #34d399; }
    .text-red { color: #f87171; }

    @keyframes pulse {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="pill" class="dynamic-island-pill idle">
    <!-- 取消按钮 -->
    <button id="btn-cancel" class="pill-btn cancel" style="display:none;" title="取消听写">×</button>
    
    <div id="content" class="pill-content">
      <span id="txt" class="pill-text">按住说话</span>
    </div>
    
    <!-- 确认按钮 -->
    <button id="btn-confirm" class="pill-btn confirm" style="display:none;" title="立即发送">✓</button>
  </div>

  <script>
    // 在组件初始化时直接隐藏自己
    try {
      if (window.__TAURI__ && window.__TAURI__.webviewWindow) {
        window.__TAURI__.webviewWindow.getCurrentWebviewWindow().hide();
      } else if (window.__TAURI__ && window.__TAURI__.window) {
        window.__TAURI__.window.getCurrentWindow().hide();
      }
    } catch (e) {
      console.error("Failed to hide window on init:", e);
    }

    let listen = () => {};
    let emit = () => {};
    try {
      if (window.__TAURI__ && window.__TAURI__.event) {
        listen = window.__TAURI__.event.listen;
        emit = window.__TAURI__.event.emit;
      }
    } catch (e) {
      console.error("Failed to load Tauri event API:", e);
    }
    
    const pill = document.getElementById("pill");
    const txt = document.getElementById("txt");
    const btnCancel = document.getElementById("btn-cancel");
    const btnConfirm = document.getElementById("btn-confirm");
    const content = document.getElementById("content");
    
    // 监听主进程广播的状态
    listen("indicator-state", (event) => {
      const { status, errorMessage } = event.payload;
      
      // 更新状态类名以触发 CSS 宽度转换
      pill.className = `dynamic-island-pill ${status}`;
      
      // 每次状态变更，重置按钮的特殊高亮状态类名
      btnCancel.className = "pill-btn cancel";
      btnConfirm.className = "pill-btn confirm";
      
      if (status === "recording") {
        btnCancel.style.display = "flex";
        btnConfirm.style.display = "flex";
        
        content.innerHTML = `
          <div class="pill-audio-wave">
            <span class="wave-bar bar-1"></span>
            <span class="wave-bar bar-2"></span>
            <span class="wave-bar bar-3"></span>
            <span class="wave-bar bar-4"></span>
            <span class="wave-bar bar-5"></span>
          </div>
        `;
      } else if (status === "success") {
        // 成功状态：只显示 ✔ 且变成绿色高亮，隐藏 ×，中间在声波后实时展示录入文字
        btnCancel.style.display = "none";
        btnConfirm.style.display = "flex";
        btnConfirm.classList.add("success-state");
        
        const textToShow = event.payload.text || "";
        
        content.innerHTML = `
          <div style="display: flex; align-items: center; gap: 8px; overflow: hidden;">
            <div class="pill-audio-wave" style="flex-shrink: 0;">
              <span class="wave-bar bar-1" style="transform: scaleY(0.35);"></span>
              <span class="wave-bar bar-2" style="transform: scaleY(0.35);"></span>
              <span class="wave-bar bar-3" style="transform: scaleY(0.35);"></span>
              <span class="wave-bar bar-4" style="transform: scaleY(0.35);"></span>
              <span class="wave-bar bar-5" style="transform: scaleY(0.35);"></span>
            </div>
            <span class="pill-text text-green" style="font-size: 0.8rem; font-weight: normal; max-width: 175px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${textToShow}</span>
          </div>
        `;
      } else if (status === "error") {
        // 失败状态：只显示 × 且变成红色高亮，隐藏 ✔，中间显示静置极矮条
        btnCancel.style.display = "flex";
        btnCancel.classList.add("error-state");
        btnConfirm.style.display = "none";
        
        content.innerHTML = `
          <div class="pill-audio-wave">
            <span class="wave-bar bar-1" style="transform: scaleY(0.35);"></span>
            <span class="wave-bar bar-2" style="transform: scaleY(0.35);"></span>
            <span class="wave-bar bar-3" style="transform: scaleY(0.35);"></span>
            <span class="wave-bar bar-4" style="transform: scaleY(0.35);"></span>
            <span class="wave-bar bar-5" style="transform: scaleY(0.35);"></span>
          </div>
        `;
      } else {
        btnCancel.style.display = "none";
        btnConfirm.style.display = "none";
        
        if (status === "transcribing") {
          content.innerHTML = `<span class="pill-text">语音识别中...</span>`;
        } else if (status === "rewriting") {
          content.innerHTML = `<span class="pill-text" style="animation: pulse 0.8s infinite alternate;">优化润色中</span>`;
        } else {
          content.innerHTML = `<span class="pill-text">按住说话</span>`;
        }
      }
    });
    
    // 监听实时音量，动态伸缩波形条高度
    listen("indicator-volume", (event) => {
      const { volume } = event.payload; // 0 ~ 100
      const bars = document.querySelectorAll(".wave-bar");
      if (bars.length === 5) {
        const base = volume / 100;
        // 5 个波形条的拉伸振幅比例
        const coefficients = [0.4, 0.9, 0.6, 1.1, 0.5];
        bars.forEach((bar, index) => {
          const coef = coefficients[index];
          // 计算最终 scaleY。0.25 为静音时保底高度比例，最大支持约 1.4 倍的精细拉伸
          const scale = 0.25 + base * coef * 1.15;
          bar.style.transform = `scaleY(${scale})`;
        });
      }
    });

    // 按钮动作中转
    btnCancel.onclick = () => {
      emit("pill-action", { action: "cancel" });
    };
    btnConfirm.onclick = () => {
      emit("pill-action", { action: "commit" });
    };
  </script>
</body>
</html>
